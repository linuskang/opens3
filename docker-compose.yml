services:
  opens3:
    build: .
    container_name: opens3
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - opens3-data:/data
    environment:
      OPENS3_ACCESS_KEY: minioadmin
      OPENS3_SECRET_KEY: minioadmin
      OPENS3_REGION: us-east-1
      OPENS3_DATA_DIR: /data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/_opens3/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  opens3-data:
    driver: local
